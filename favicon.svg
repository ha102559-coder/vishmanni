<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black background circle -->
  <circle cx="50" cy="50" r="50" fill="#0d0a06"/>
  <!-- Gold ring border -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#c8930a" stroke-width="2.5"/>
  <!-- Inner subtle ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#e8b84b" stroke-width="0.8" opacity="0.4"/>
  <!-- 芳 character in gold -->
  <text
    x="50"
    y="50"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="'Noto Serif TC', 'Kaiti TC', serif"
    font-size="54"
    font-weight="700"
    fill="#e8b84b"
    letter-spacing="0"
  >芳</text>
</svg>
